name: fruits
description: Un nouveau projet Flutter
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  audioplayers: ^6.0.0   # ✅ sons win/lose
  shared_preferences: ^2.2.2   # ✅ sauvegarde du high score

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    # 📸 Images des fruits (ordre exact)
    - assets/images/Ananas.jpg
    - assets/images/Avocat.jpg
    - assets/images/Banane.jpg
    - assets/images/Citron.jpg
    - assets/images/Fraise.jpg
    - assets/images/Mangue.jpg
    - assets/images/Pasteque.jpg
    - assets/images/Pomme.jpg
    - assets/images/Raisin.jpg

    # 🔊 Sons (sans tic-tac)
    - assets/sounds/win.mp3
    - assets/sounds/lose.mp3
